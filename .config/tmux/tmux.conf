# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off


# File picker (yazi popup → opens file in current pane)
bind f run-shell "tmux split-window -v -l 50% -c '#{pane_current_path}' '~/.config/tmux/yazi-picker.sh #{pane_id}'"

# Toggle Claude Code pane (break to hidden window / join back as vertical split)
bind g run-shell "~/.config/tmux/claude-toggle.sh"

# Popups
bind L display-popup -E -d "#{pane_current_path}" -w 80% -h 80% lazygit
bind D display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "~/.config/tmux/sqlite-picker.sh #{pane_current_path}"

# Pane Controls
unbind %
unbind '"'
bind h split-window -v -l 25% -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation
bind c new-window -c "#{pane_current_path}"

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

# bind-key prefix [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Search (like / and ? in vi)
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Status bar
set -g status-position top
set -g status-left-length 100
set -g status-style "fg=default,bg=default"
set -g status-left "#[fg=green,bold] #S #[fg=white,nobold] | "
set -g window-status-current-format "#[fg=cyan,bold]  #[underscore]#I:#W"
set -g window-status-format " #I:#W"
set -g message-style "fg=white,bg=default"
set -g mode-style "fg=gray,bg=blue"
set -g pane-border-style "fg=gray"
set -g pane-active-border-style "fg=green"

set -g status-right "#[fg=yellow,bold]#{client_key_table}#[default,nobold] | %Y-%m-%d %H:%M"
